<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Školní bezpečnost</title>

  <!-- PWA — aplikace lze "nainstalovat" na plochu tabletu/počítače -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003d82">

  <!-- Ikony pro různé platformy -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- iOS Safari — lepší zobrazení po přidání na plochu -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Školní bezpečnost">

  <!-- Auth: vlastní OAuth 2.0 + PKCE implementace, žádná externí závislost.
       Komunikuje přímo s login.microsoftonline.com (standardní endpoint). -->


  <!-- Config — vyplň své hodnoty (clientId a tenantId) v souboru config.js -->
  <script src="config.js"></script>

  <style>
    /* =======================================================================
       Školní bezpečnost — dashboard pro EDU tenant
       Fáze 1: UI kostra s i18n (CZ/EN), bez MSAL, bez Graphu.
       ======================================================================= */

    :root {
      /* Barevná paleta — navy blue + white */
      --bg: #f4f7fb;           /* jemný modro-šedý podklad */
      --panel: #ffffff;        /* bílé karty */
      --border: #d6e0ec;       /* jemná modravá čára */
      --text: #0f1f3a;         /* tmavě navy místo čisté černé */
      --text-muted: #5a6b82;   /* tlumená modro-šedá */
      --accent: #003d82;       /* navy */
      --accent-hover: #002b5c; /* tmavší navy pro hover */
      --accent-light: #e8f0fa; /* světlý modrý hover podklad */
      --critical: #dc2626;
      --warning: #f59e0b;
      --info: #0891b2;
      --ok: #16a34a;
      --shadow: 0 1px 2px rgba(10, 30, 70, 0.04), 0 2px 8px rgba(10, 30, 70, 0.04);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* --- Layout: sidebar + main --- */
    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    /* --- Sidebar --- */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    .brand {
      background: var(--accent);
      color: white;
      padding: 20px;
    }
    .brand h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: white;
    }
    .brand .subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.75);
    }

    .nav { padding: 12px 0; flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;       /* větší pro dotyk */
      cursor: pointer;
      border-left: 3px solid transparent;
      user-select: none;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .nav-item:hover { background: var(--accent-light); }
    .nav-item.active {
      background: var(--accent-light);
      border-left-color: var(--accent);
      font-weight: 500;
      color: var(--accent);
    }
    .nav-item .count {
      background: var(--border);
      color: var(--text-muted);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 500;
    }
    .nav-item.active .count {
      background: var(--accent);
      color: white;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* --- Main panel --- */
    .main {
      padding: 24px 32px;
      overflow-y: auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .topbar h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }
    .topbar .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* --- Buttons --- */
    .btn {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 9px 16px;       /* větší pro dotyk — min 44px tap target */
      min-height: 40px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* --- Login card (shown when not authenticated) --- */
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      max-width: 500px;
      margin: 60px auto;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .login-card h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .login-card p {
      color: var(--text-muted);
      margin: 0 0 24px;
    }

    /* --- KPI cards --- */
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .kpi {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      border-top: 3px solid var(--accent);
    }
    .kpi .label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .kpi .value {
      font-size: 28px;
      font-weight: 600;
      margin-top: 4px;
      color: var(--accent);
    }
    .kpi.critical {
      border-top-color: var(--critical);
    }
    .kpi.critical .value { color: var(--critical); }
    .kpi.warning {
      border-top-color: var(--warning);
    }
    .kpi.warning .value { color: var(--warning); }
    .kpi.ok {
      border-top-color: var(--ok);
    }
    .kpi.ok .value { color: var(--ok); }

    /* --- Findings table --- */
    .findings {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .findings-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .findings-header h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }
    .filter-bar {
      display: flex;
      gap: 8px;
    }
    .filter-bar select, .filter-bar input {
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      background: var(--panel);
    }

    .finding-row {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .finding-row:last-child { border-bottom: none; }
    .finding-row:hover { background: var(--accent-light); }

    .severity {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .severity.critical { background: #fee2e2; color: var(--critical); }
    .severity.warning { background: #fef3c7; color: #b45309; }
    .severity.info { background: #cffafe; color: var(--info); }

    .finding-msg {
      font-size: 13px;
    }
    .finding-msg .detail {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 2px;
    }
    .finding-time {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 8px; }

    /* --- Language switcher --- */
    .lang-switch {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
      font-size: 12px;
    }
    .lang-switch button {
      border: none;
      background: var(--panel);
      padding: 5px 10px;
      cursor: pointer;
      color: var(--text-muted);
    }
    .lang-switch button.active {
      background: var(--accent);
      color: white;
    }

    /* --- Mobile menu toggle (tlačítko vlevo nahoře, viditelné jen na malých obrazovkách) --- */
    .menu-toggle {
      display: none;
      background: var(--accent);
      color: white;
      border: none;
      padding: 0;
      width: 44px;
      height: 44px;
      border-radius: 6px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .menu-toggle:active { background: var(--accent-hover); }

    /* --- Backdrop pod sidebarem na mobilu --- */
    .backdrop {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(15, 31, 58, 0.4);
      z-index: 100;
    }
    .backdrop.show { display: block; }

    /* --- Filtr bar — větší pro dotyk --- */
    .filter-bar select, .filter-bar input {
      min-height: 36px;
    }

    /* --- Responsive --- */
    @media (max-width: 1024px) {
      /* Tablet — sidebar je skrytý, otevírá se tlačítkem */
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        top: 0; left: 0;
        height: 100vh;
        width: 280px;
        z-index: 101;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        box-shadow: 0 0 20px rgba(0,0,0,0.15);
      }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: inline-flex; }
      .main { padding: 16px 20px; }
    }

    @media (max-width: 480px) {
      /* Mobil — kompaktnější padding */
      .main { padding: 12px; }
      .topbar h2 { font-size: 17px; }
      .kpis { grid-template-columns: repeat(2, 1fr); }
      .kpi { padding: 12px; }
      .kpi .value { font-size: 22px; }
      .finding-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }

    /* --- Settings modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(15, 31, 58, 0.55);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      padding: 5vh 16px;
      overflow-y: auto;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--panel);
      border-radius: 10px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .modal-header {
      background: var(--accent);
      color: white;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h3 {
      margin: 0;
      font-size: 17px;
      color: white;
    }
    .modal-close {
      background: transparent;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }
    .modal-close:hover { background: rgba(255,255,255,0.15); }
    .modal-body {
      padding: 24px;
    }
    .modal-intro {
      margin: 0 0 20px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .field input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      min-height: 40px;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .field .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .tenant-row {
      display: grid;
      grid-template-columns: 1fr 1.5fr 40px;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    .tenant-row input { min-height: 38px; }
    .tenant-row .remove-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 38px;
      height: 38px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    .tenant-row .remove-btn:hover {
      background: #fee2e2;
      color: var(--critical);
      border-color: var(--critical);
    }
    .modal-footer {
      padding: 16px 24px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .privacy-banner-small {
      font-size: 11px;
      color: var(--text-muted);
      flex: 1 1 auto;
      min-width: 200px;
    }

    /* --- Tenant picker (jen v multi-tenant režimu) --- */
    .tenant-picker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px 0 12px;
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: 6px;
      min-height: 40px;
    }
    .tenant-picker .tenant-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .tenant-picker select {
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      padding: 8px 4px;
      min-height: 38px;
    }
    .tenant-picker select:focus { outline: none; }

    /* --- Privacy banner na patičce --- */
    .privacy-note {
      margin-top: 24px;
      padding: 12px 16px;
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .privacy-note strong { color: var(--accent); }
  </style>
</head>
<body>

<div class="app">

  <!-- Backdrop pro mobilní menu — kliknutí zavře sidebar -->
  <div class="backdrop" id="backdrop"></div>

  <!-- ======================== SIDEBAR ======================== -->
  <aside class="sidebar">
    <div class="brand">
      <h1 data-i18n="app.title">Školní bezpečnost</h1>
      <p class="subtitle" data-i18n="app.subtitle">Dashboard pro EDU tenant</p>
    </div>

    <nav class="nav" id="nav">
      <!-- Naplní se JS -->
    </nav>

    <div class="sidebar-footer">
      <div class="lang-switch">
        <button data-lang="cs" class="active">CS</button>
        <button data-lang="en">EN</button>
      </div>
      <div style="margin-top: 10px;" id="tenant-info" data-i18n="app.notConnected">
        Nepřipojeno
      </div>
    </div>
  </aside>

  <!-- ======================== MAIN ======================== -->
  <main class="main" id="main">
    <!-- Naplní se JS -->
  </main>

</div>

<!-- ======================== SETTINGS MODAL ======================== -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="settings-title">Nastavení aplikace</h3>
      <button class="modal-close" id="settings-close" aria-label="Zavřít">×</button>
    </div>
    <div class="modal-body">
      <p class="modal-intro" id="settings-intro"></p>

      <div class="field">
        <label id="lbl-clientId" for="cfg-clientId">Client ID</label>
        <input type="text" id="cfg-clientId" placeholder="00000000-0000-0000-0000-000000000000" autocomplete="off">
        <div class="hint" id="hint-clientId"></div>
      </div>

      <div class="field">
        <label id="lbl-tenants">Tenanty</label>
        <div class="hint" id="hint-tenants" style="margin-bottom: 10px;"></div>
        <div id="tenants-list"></div>
        <button class="btn" id="btn-add-tenant" style="margin-top: 8px;">+ Přidat tenant</button>
      </div>
    </div>
    <div class="modal-footer">
      <span class="privacy-banner-small" id="privacy-banner-small"></span>
      <div style="display: flex; gap: 8px;">
        <button class="btn" id="btn-clear-config" style="color: var(--critical); border-color: var(--critical);">Smazat vše</button>
        <button class="btn" id="btn-cancel-settings">Zrušit</button>
        <button class="btn primary" id="btn-save-config">Uložit</button>
      </div>
    </div>
  </div>
</div>

    if (searchQuery) {
      const msg = currentLang === "cs" ? f.message : (f.messageEn || f.message);
      if (!msg.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    }
    return true;
  });

/* ==========================================================================
   5) EXPORT CSV — jednoduchá funkce pro stažení nálezů do CSV
   ========================================================================== */

function exportCsv() {
  const filtered = getFilteredFindings();
  const headers = ["severity", "category", "when", "message", "detail"];
  const rows = filtered.map(f => {
    const msg = currentLang === "cs" ? f.message : (f.messageEn || f.message);
    const detail = currentLang === "cs" ? f.detail : (f.detailEn || f.detail);
    return [f.severity, f.category, f.when, msg, detail || ""]
      .map(v => '"' + String(v).replace(/"/g, '""') + '"')
      .join(",");
  });
  const csv = "\ufeff" + headers.join(",") + "\n" + rows.join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "skolni-bezpecnost-" + new Date().toISOString().slice(0,10) + ".csv";
  a.click();
  URL.revokeObjectURL(url);
}

/* ==========================================================================
   6) AUTH — vlastní OAuth 2.0 Authorization Code + PKCE implementace

   Komunikujeme přímo s https://login.microsoftonline.com (standardní
   Microsoft Entra endpoint). Nepotřebujeme MSAL knihovnu ani jiné
   externí JS dependency.

   Flow:
   1. Uživatel klikne "Přihlásit" → vygenerujeme PKCE verifier+challenge,
      uložíme do sessionStorage, přesměrujeme na Microsoft authorize URL.
   2. Microsoft přesměruje zpět s ?code=...
   3. Při načtení stránky zjistíme kód v URL, vyměníme ho za access token
      (POST na /token endpoint) a uložíme do sessionStorage.
   4. Token používáme pro Graph API volání.

   Bezpečnost:
   - PKCE (RFC 7636) chrání před interception útoky.
   - State parametr chrání před CSRF.
   - Token v sessionStorage (smaže se zavřením záložky).
   - Žádné heslo neprochází naší aplikací.
   ========================================================================== */

const AUTH_TOKEN_KEY = "auth.tokens";
const AUTH_PKCE_KEY = "auth.pkce_verifier";
const AUTH_STATE_KEY = "auth.state";
const AUTH_TENANT_KEY = "auth.last_tenant";

let currentAccount = null;
let currentTokens = null;

/* --------------------------------------------------------------------------
   Konfigurace — žije v localStorage prohlížeče.

   Filozofie: žádné citlivé hodnoty (clientId, tenant IDs, jména školek)
   nikdy nejsou v repu. Uživatel je vyplní v aplikaci ("Nastavení"),
   uloží se jen v jeho prohlížeči a nikam jinam.
   -------------------------------------------------------------------------- */

const LS_CONFIG_KEY = "skolni-bezpecnost.config";

// Načte uživatelovu konfiguraci z localStorage (nebo null, pokud žádná není)
function loadUserConfig() {
  try {
    const raw = localStorage.getItem(LS_CONFIG_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object") return null;
    return parsed;
  } catch (e) {
    console.warn("[config] Nelze načíst uloženou konfiguraci:", e);
    return null;
  }
}

// Uloží uživatelovu konfiguraci do localStorage
function saveUserConfig(cfg) {
  localStorage.setItem(LS_CONFIG_KEY, JSON.stringify(cfg));
}

// Vrátí "efektivní" config — preferuje uživatelův z localStorage, jinak APP_CONFIG.
function getEffectiveConfig() {
  const user = loadUserConfig();
  if (user && user.clientId) return user;
  return window.APP_CONFIG || { clientId: "", managedTenants: [], scopes: ["User.Read"] };
}

function isConfigFilled() {
  const cfg = getEffectiveConfig();
  if (!cfg || !cfg.clientId) return false;
  if (!Array.isArray(cfg.managedTenants) || cfg.managedTenants.length === 0) return false;
  return cfg.managedTenants.some(t => t.id);
}

// Vrátí seznam validních tenantů
function getManagedTenants() {
  const cfg = getEffectiveConfig();
  if (!cfg || !Array.isArray(cfg.managedTenants)) return [];
  return cfg.managedTenants.filter(t => t.id);
}

// Aktuálně vybraný tenant (default první z managedTenants)
let activeTenantId = null;

function getActiveTenant() {
  const tenants = getManagedTenants();
  if (tenants.length === 0) return null;
  if (!activeTenantId) activeTenantId = tenants[0].id;
  return tenants.find(t => t.id === activeTenantId) || tenants[0];
}

// ---- PKCE helpers (RFC 7636) ----

function authRandStr(len) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
  return Array.from(arr).map(b => chars[b % chars.length]).join("");
}

async function authSha256B64Url(s) {
  const data = new TextEncoder().encode(s);
  const hash = await crypto.subtle.digest("SHA-256", data);
  let bin = "";
  new Uint8Array(hash).forEach(b => bin += String.fromCharCode(b));
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function authParseJwt(token) {
  try {
    const part = token.split(".")[1];
    const padded = part.replace(/-/g, "+").replace(/_/g, "/");
    const json = atob(padded + "=".repeat((4 - padded.length % 4) % 4));
    return JSON.parse(decodeURIComponent(escape(json)));
  } catch (e) {
    return null;
  }
}

function authRedirectUri() {
  return window.location.origin + window.location.pathname;
}

function authIsTokenExpired(tokens) {
  if (!tokens || !tokens.expires_at) return true;
  return Date.now() >= tokens.expires_at - 60000; // 1 min buffer
}

function authLoadTokens() {
  try {
    const raw = sessionStorage.getItem(AUTH_TOKEN_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

function authSaveTokens(tokens) {
  sessionStorage.setItem(AUTH_TOKEN_KEY, JSON.stringify(tokens));
}

function authClearTokens() {
  sessionStorage.removeItem(AUTH_TOKEN_KEY);
  sessionStorage.removeItem(AUTH_PKCE_KEY);
  sessionStorage.removeItem(AUTH_STATE_KEY);
}

// ---- Hlavní auth funkce ----

async function initAuth() {
  if (!isConfigFilled()) {
    console.log("[auth] Config není vyplněn — přihlášení zatím neaktivní.");
    return;
  }

  // 1) Po návratu z Microsoftu zpracuj ?code=... v URL
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has("code")) {
    await authHandleRedirect(urlParams);
    // Vyčisti URL od OAuth parametrů
    window.history.replaceState({}, "", window.location.pathname);
  } else if (urlParams.has("error")) {
    const err = urlParams.get("error");
    const desc = urlParams.get("error_description") || "";
    console.error("[auth] OAuth chyba:", err, desc);
    alert(t("auth.loginFailed") + "\n\n" + err + (desc ? "\n" + decodeURIComponent(desc.replace(/\+/g, " ")) : ""));
    window.history.replaceState({}, "", window.location.pathname);
  } else {
    // 2) Jinak zkus načíst existující tokeny ze sessionStorage
    const stored = authLoadTokens();
    if (stored && !authIsTokenExpired(stored)) {
      currentTokens = stored;
      currentAccount = authParseJwt(stored.id_token);
      console.log("[auth] Obnoven token z předchozí session pro:", currentAccount?.name);
      // Obnov aktivní tenant
      const lastTenant = sessionStorage.getItem(AUTH_TENANT_KEY);
      if (lastTenant) activeTenantId = lastTenant;
    } else if (stored) {
      console.log("[auth] Stored token expiroval, mazu.");
      authClearTokens();
    }
  }
}

async function authHandleRedirect(params) {
  const code = params.get("code");
  const state = params.get("state");
  const storedState = sessionStorage.getItem(AUTH_STATE_KEY);

  if (state !== storedState) {
    console.error("[auth] State mismatch — možný CSRF útok nebo expirovaná session.");
    authClearTokens();
    alert("Přihlášení selhalo: neplatný stav (state). Zkuste to znovu.");
    return;
  }

  const verifier = sessionStorage.getItem(AUTH_PKCE_KEY);
  if (!verifier) {
    console.error("[auth] PKCE verifier chybí.");
    authClearTokens();
    return;
  }

  const cfg = getEffectiveConfig();
  const tenant = getActiveTenant();
  if (!tenant) {
    console.error("[auth] Žádný aktivní tenant.");
    return;
  }

  const body = new URLSearchParams({
    client_id: cfg.clientId,
    grant_type: "authorization_code",
    code: code,
    redirect_uri: authRedirectUri(),
    code_verifier: verifier
  });

  try {
    const res = await fetch("https://login.microsoftonline.com/" + tenant.id + "/oauth2/v2.0/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body
    });

    if (!res.ok) {
      const errText = await res.text();
      console.error("[auth] Token exchange selhal:", res.status, errText);
      try {
        const errObj = JSON.parse(errText);
        alert(t("auth.loginFailed") + "\n\n" + errObj.error + "\n" + errObj.error_description);
      } catch (e) {
        alert(t("auth.loginFailed") + "\n\nHTTP " + res.status);
      }
      return;
    }

    const tokens = await res.json();
    tokens.expires_at = Date.now() + ((tokens.expires_in || 3600) * 1000);
    authSaveTokens(tokens);
    currentTokens = tokens;
    currentAccount = authParseJwt(tokens.id_token);
    console.log("[auth] Úspěšně přihlášen:", currentAccount?.name);
  } catch (e) {
    console.error("[auth] Síťová chyba při token exchange:", e);
    alert(t("auth.loginFailed") + "\n\n" + e.message);
  } finally {
    // Vyčisti PKCE a state, už nejsou potřeba
    sessionStorage.removeItem(AUTH_PKCE_KEY);
    sessionStorage.removeItem(AUTH_STATE_KEY);
  }
}

async function signIn() {
  if (!isConfigFilled()) {
    alert(t("auth.configMissing"));
    return;
  }

  const cfg = getEffectiveConfig();
  const tenant = getActiveTenant();
  if (!tenant) {
    alert(t("auth.configMissing"));
    return;
  }

  try {
    const verifier = authRandStr(64);
    const challenge = await authSha256B64Url(verifier);
    const state = authRandStr(32);

    sessionStorage.setItem(AUTH_PKCE_KEY, verifier);
    sessionStorage.setItem(AUTH_STATE_KEY, state);
    sessionStorage.setItem(AUTH_TENANT_KEY, tenant.id);

    // Komplexní sada scope pro všechny implementované checky.
    // Microsoft je nezobrazí jednotlivě — uživatel uvidí seznam "what this app can do".
    // Admin musí dát consent (většina vyžaduje admin-only).
    const DEFAULT_SCOPES = [
      "User.Read",
      "AuditLog.Read.All",                  // sign-in logs, role changes, consents
      "Directory.Read.All",                 // users, groups, organization, licenses
      "Group.Read.All",                     // Teams, M365 groups
      "Policy.Read.All",                    // Conditional Access
      "UserAuthenticationMethod.Read.All",  // MFA status
      "MailboxSettings.Read",               // forwarding rules
      "Application.Read.All",               // OAuth apps, app registrations
      "SecurityEvents.Read.All",            // Defender alerts, incidents, Secure Score
      "IdentityRiskEvent.Read.All",         // risk detections
      "IdentityRiskyUser.Read.All",         // risky users (Identity Protection)
      "DeviceManagementManagedDevices.Read.All", // Intune managed devices
      "Organization.Read.All"               // subscribed SKUs / licenses
    ];
    const scopes = (cfg.scopes && cfg.scopes.length > 1 ? cfg.scopes : DEFAULT_SCOPES)
      .concat(["openid", "profile"]);

    const url = new URL("https://login.microsoftonline.com/" + tenant.id + "/oauth2/v2.0/authorize");
    url.searchParams.set("client_id", cfg.clientId);
    url.searchParams.set("response_type", "code");
    url.searchParams.set("redirect_uri", authRedirectUri());
    url.searchParams.set("scope", scopes.join(" "));
    url.searchParams.set("code_challenge", challenge);
    url.searchParams.set("code_challenge_method", "S256");
    url.searchParams.set("state", state);
    url.searchParams.set("prompt", "select_account");
    url.searchParams.set("response_mode", "query");

    console.log("[auth] Přesměrovávám na Microsoft login...");
    window.location.href = url.toString();
  } catch (e) {
    console.error("[auth] Příprava přihlášení selhala:", e);
    alert(t("auth.loginFailed") + "\n\n" + e.message);
  }
}

function signOut() {
  const tenant = getActiveTenant();
  authClearTokens();
  sessionStorage.removeItem(AUTH_TENANT_KEY);
  currentAccount = null;
  currentTokens = null;

  if (tenant) {
    // Přesměruj na Microsoft logout, který nás pak vrátí na náš dashboard
    const url = "https://login.microsoftonline.com/" + tenant.id +
                "/oauth2/v2.0/logout?post_logout_redirect_uri=" +
                encodeURIComponent(authRedirectUri());
    window.location.href = url;
  } else {
    render();
  }
}

// Přepnout aktivní tenant — vyčistí session a otevře přihlášení do nového
async function switchTenant(newTenantId) {
  const tenants = getManagedTenants();
  if (!tenants.find(t => t.id === newTenantId)) return;

  // Lokální logout (bez redirectu na Microsoft logout)
  authClearTokens();
  currentAccount = null;
  currentTokens = null;
  activeTenantId = newTenantId;
  sessionStorage.setItem(AUTH_TENANT_KEY, newTenantId);
  render();

  // Automaticky vyvolej přihlášení do nového tenantu
  if (confirm("Tenant přepnut na: " + (tenants.find(t => t.id === newTenantId)?.name) + ".\n\nPřihlásit se teď?")) {
    await signIn();
  }
}

function isAuthenticated() {
  return currentAccount !== null && currentTokens !== null && !authIsTokenExpired(currentTokens);
}

function getAccountName() {
  if (!currentAccount) return "";
  return currentAccount.name || currentAccount.preferred_username || currentAccount.upn || currentAccount.email || "";
}

// Vrátí access token pro Microsoft Graph volání. Pokud expiroval, vrátí null
// (nebo později implementujeme silent refresh přes hidden iframe).
async function getAccessToken() {
  if (!currentTokens) return null;
  if (authIsTokenExpired(currentTokens)) {
    console.warn("[auth] Token expiroval, je potřeba nové přihlášení.");
    return null;
  }
  return currentTokens.access_token;
}

/* ==========================================================================
   7) GRAPH API + CHECK FRAMEWORK

   Každý "check" je malá funkce, která:
     - dostane access token + info o tenantu
     - zavolá Microsoft Graph API
     - vrátí pole "findings" (zjištění)
   Findings se pak sjednotí a vykreslí v dashboardu místo demo dat.

   Checky deklarují své kategorie a license requirement — pokud Graph
   vrátí 403/Forbidden (chybí licence/oprávnění), check místo erroru
   vrátí informativní finding "tato kontrola vyžaduje X".
   ========================================================================== */

const GRAPH_BASE = "https://graph.microsoft.com/v1.0";
const registeredChecks = [];
let lastFindings = [];           // poslední běh – nahrazuje demoFindings když jsme přihlášeni
let lastRefreshTime = null;
let isRefreshing = false;

function registerCheck(def) {
  registeredChecks.push(def);
}

// Voláme jako: const data = await graphGet("/auditLogs/signIns?$top=20", token);
async function graphGet(path, token) {
  const url = path.startsWith("http") ? path : GRAPH_BASE + path;
  const res = await fetch(url, {
    headers: { "Authorization": "Bearer " + token, "Accept": "application/json" }
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => "");
    const err = new Error("HTTP " + res.status + ": " + txt.slice(0, 200));
    err.status = res.status;
    err.body = txt;
    throw err;
  }
  return res.json();
}

// Stáhne všechny stránky (sleduje @odata.nextLink). limit chrání před nekonečnou smyčkou.
async function graphGetAll(path, token, limit = 500) {
  let items = [];
  let next = path;
  while (next && items.length < limit) {
    const data = await graphGet(next, token);
    if (Array.isArray(data.value)) items = items.concat(data.value);
    next = data["@odata.nextLink"] || null;
    if (next && next.startsWith("https://graph.microsoft.com/v1.0")) {
      next = next.substring("https://graph.microsoft.com/v1.0".length);
    }
  }
  return items.slice(0, limit);
}

// Spustí všechny registrované checky a vrátí sjednocené findings.
async function runAllChecks() {
  const token = await getAccessToken();
  if (!token) {
    console.warn("[checks] Nelze získat token, přeskakuji.");
    return [];
  }
  const tenant = getActiveTenant();
  const out = [];

  for (const check of registeredChecks) {
    if (check.enabled === false) continue;
    console.log("[checks] Spouštím:", check.id);
    try {
      const result = await check.run(token, tenant);
      if (result && Array.isArray(result.findings)) {
        for (const f of result.findings) {
          out.push({
            id: f.id || (check.id + "-" + Math.random().toString(36).slice(2, 8)),
            severity: f.severity || "info",
            category: f.category || check.category || "misc",
            when: f.when || new Date().toISOString(),
            message: f.message,
            messageEn: f.messageEn || f.message,
            detail: f.detail || "",
            detailEn: f.detailEn || f.detail || "",
            checkId: check.id
          });
        }
      }
    } catch (e) {
      console.error("[checks]", check.id, "failed:", e);
      if (e.status === 403) {
        out.push({
          id: check.id + "-perm",
          severity: "info",
          category: check.category || "misc",
          when: new Date().toISOString(),
          message: check.name + ": chybí oprávnění nebo licence (HTTP 403)",
          messageEn: check.name + ": permission or license missing (HTTP 403)",
          detail: check.requiredLicense ? "Vyžaduje: " + check.requiredLicense : "Zkontroluj admin consent v Entře",
          detailEn: check.requiredLicense ? "Requires: " + check.requiredLicense : "Check admin consent in Entra"
        });
      } else if (e.status === 401) {
        out.push({
          id: check.id + "-auth",
          severity: "warning",
          category: check.category || "misc",
          when: new Date().toISOString(),
          message: check.name + ": token expiroval, přihlas se znovu",
          messageEn: check.name + ": token expired, please re-login"
        });
      }
      // Jiné chyby (síť, 5xx) zalogujeme, ale nepřidáváme do findings
    }
  }
  return out;
}

// Refresh dat z Graphu — volá se po loginu a tlačítkem Obnovit.
async function refreshFindings() {
  if (!isAuthenticated()) return;
  if (isRefreshing) return;
  isRefreshing = true;
  render();
  try {
    lastFindings = await runAllChecks();
    lastRefreshTime = new Date();
    console.log("[checks] Dokončeno, nálezů:", lastFindings.length);
  } catch (e) {
    console.error("[checks] refresh failed:", e);
  } finally {
    isRefreshing = false;
    render();
  }
}

// Zdroj findings pro UI — reálné pokud máme, jinak demo.
function getCurrentFindings() {
  return isAuthenticated() && lastFindings.length > 0 ? lastFindings : demoFindings;
}

function isShowingRealData() {
  return isAuthenticated() && lastFindings.length > 0;
}

/* ----------------- Registrované checky ----------------- */

// CHECK 1: Riziková přihlášení (Identity Protection sign-in risk)
// Hledá sign-iny s ne-zero risk levelem — netypické lokace, anonymní IP, atd.
registerCheck({
  id: "risky-signins",
  name: "Riziková přihlášení",
  category: "threats",
  requiredLicense: "Entra ID P1+",
  run: async (token, tenant) => {
    const since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
    const url = "/auditLogs/signIns?$top=50&$filter=createdDateTime ge " + since +
                " and riskLevelDuringSignIn ne 'none'&$orderby=createdDateTime desc";
    const items = await graphGetAll(url, token, 100);

    const findings = items.map(s => {
      const risk = s.riskLevelDuringSignIn || "low";
      const sev = risk === "high" ? "critical" : (risk === "medium" ? "warning" : "info");
      const loc = s.location ? [s.location.city, s.location.countryOrRegion].filter(Boolean).join(", ") : "?";
      return {
        severity: sev,
        when: s.createdDateTime,
        message: "Rizikové přihlášení: " + (s.userPrincipalName || "neznámý uživatel") + " z " + loc,
        messageEn: "Risky sign-in: " + (s.userPrincipalName || "unknown user") + " from " + loc,
        detail: "Risk: " + risk + " · App: " + (s.appDisplayName || "?") + " · IP: " + (s.ipAddress || "?"),
        detailEn: "Risk: " + risk + " · App: " + (s.appDisplayName || "?") + " · IP: " + (s.ipAddress || "?")
      };
    });
    return { findings };
  }
});

// CHECK 2: Změny admin rolí (přidání/odebrání člena z role)
registerCheck({
  id: "role-changes",
  name: "Změny admin rolí",
  category: "identity",
  run: async (token, tenant) => {
    const since = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
    const url = "/auditLogs/directoryAudits?$top=50&$filter=activityDateTime ge " + since +
                " and (activityDisplayName eq 'Add member to role' or activityDisplayName eq 'Remove member from role')" +
                "&$orderby=activityDateTime desc";
    const items = await graphGetAll(url, token, 100);

    const findings = items.map(a => {
      const targetUser = (a.targetResources || []).find(r => r.type === "User");
      const role = (a.targetResources || []).find(r => r.type === "Role");
      const roleName = role?.displayName || "?";
      const isGlobalAdmin = /global admin/i.test(roleName);
      const isAdd = a.activityDisplayName.includes("Add");
      const sev = isGlobalAdmin && isAdd ? "critical" : (isAdd ? "warning" : "info");
      const action = isAdd ? "přidán do role" : "odebrán z role";
      const actionEn = isAdd ? "added to role" : "removed from role";
      return {
        severity: sev,
        when: a.activityDateTime,
        message: (targetUser?.userPrincipalName || "?") + " " + action + " " + roleName,
        messageEn: (targetUser?.userPrincipalName || "?") + " " + actionEn + " " + roleName,
        detail: "Provedl: " + (a.initiatedBy?.user?.userPrincipalName || a.initiatedBy?.app?.displayName || "?"),
        detailEn: "By: " + (a.initiatedBy?.user?.userPrincipalName || a.initiatedBy?.app?.displayName || "?")
      };
    });
    return { findings };
  }
});

// CHECK 3: OAuth consenty (uživatelé schválili aplikaci s oprávněními)
registerCheck({
  id: "app-consents",
  name: "OAuth consenty",
  category: "apps",
  run: async (token, tenant) => {
    const since = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
    const url = "/auditLogs/directoryAudits?$top=50&$filter=activityDateTime ge " + since +
                " and activityDisplayName eq 'Consent to application'&$orderby=activityDateTime desc";
    const items = await graphGetAll(url, token, 100);

    // Vyhodnoť rizikovost podle požadovaných permissions
    const HIGH_RISK_PERMS = /Mail\.|Files\.ReadWrite|Sites\.|User\.ReadWrite|Directory\.|application impersonation/i;

    const findings = items.map(a => {
      const target = (a.targetResources || [])[0];
      const appName = target?.displayName || "neznámá aplikace";
      const modProps = target?.modifiedProperties || [];
      const permsProp = modProps.find(p => /scope|permission/i.test(p.displayName));
      const permsRaw = (permsProp?.newValue || "").replace(/"/g, "");
      const isHighRisk = HIGH_RISK_PERMS.test(permsRaw);
      return {
        severity: isHighRisk ? "warning" : "info",
        when: a.activityDateTime,
        message: "Consent: aplikace " + appName + (isHighRisk ? " (vysoká oprávnění)" : ""),
        messageEn: "Consent: app " + appName + (isHighRisk ? " (high permissions)" : ""),
        detail: "Schválil: " + (a.initiatedBy?.user?.userPrincipalName || "?") + " · Perms: " + (permsRaw.slice(0, 100) || "?"),
        detailEn: "Approved by: " + (a.initiatedBy?.user?.userPrincipalName || "?") + " · Perms: " + (permsRaw.slice(0, 100) || "?")
      };
    });
    return { findings };
  }
});

// CHECK 4: Uživatelé bez registrovaného MFA
registerCheck({
  id: "mfa-status",
  name: "MFA registrace",
  category: "identity",
  run: async (token, tenant) => {
    const items = await graphGetAll("/reports/authenticationMethods/userRegistrationDetails?$top=500", token, 1000);

    const noMfa = items.filter(u => !u.isMfaRegistered);
    const adminsNoMfa = noMfa.filter(u =>
      Array.isArray(u.userType) ? false : u.userType !== "Guest"
    ).filter(u => /admin/i.test(u.userPrincipalName || "") || u.isAdmin);

    const findings = [];

    if (adminsNoMfa.length > 0) {
      findings.push({
        severity: "critical",
        when: new Date().toISOString(),
        message: adminsNoMfa.length + " admin účtů nemá registrované MFA",
        messageEn: adminsNoMfa.length + " admin accounts without MFA",
        detail: adminsNoMfa.slice(0, 5).map(u => u.userPrincipalName).join(", ") + (adminsNoMfa.length > 5 ? " a další" : ""),
        detailEn: adminsNoMfa.slice(0, 5).map(u => u.userPrincipalName).join(", ") + (adminsNoMfa.length > 5 ? " and more" : "")
      });
    }

    if (noMfa.length > 0) {
      findings.push({
        severity: noMfa.length > 100 ? "warning" : "info",
        when: new Date().toISOString(),
        message: noMfa.length + " uživatelů celkem nemá registrované MFA",
        messageEn: noMfa.length + " users without MFA registered",
        detail: "Často to jsou studentské A1 účty — zvaž zda jim povinné MFA nasadit",
        detailEn: "Often A1 student accounts — consider enforcing MFA"
      });
    }

    return { findings };
  }
});

// CHECK 5: Externí přeposílání e-mailu (klasický exfiltration signál)
// Tahá inbox rules pro každého uživatele — pomalý check, limitujeme na prvních N uživatelů.
registerCheck({
  id: "forwarding-rules",
  name: "Přeposílání pošty",
  category: "mail",
  run: async (token, tenant) => {
    // Vezmi prvních 50 aktivních uživatelů (ne hosty)
    const users = await graphGetAll(
      "/users?$top=50&$filter=accountEnabled eq true and userType eq 'Member'&$select=id,userPrincipalName,displayName",
      token, 50
    );

    const findings = [];
    for (const u of users) {
      try {
        const data = await graphGet("/users/" + u.id + "/mailFolders/inbox/messageRules", token);
        const rules = data.value || [];
        for (const rule of rules) {
          if (!rule.isEnabled) continue;
          const forwardTo = (rule.actions?.forwardTo || rule.actions?.forwardAsAttachmentTo || rule.actions?.redirectTo || []);
          for (const recip of forwardTo) {
            const addr = recip.emailAddress?.address || "";
            const domain = addr.split("@")[1] || "";
            const isExternal = domain && !addr.endsWith("@" + (tenant.name || "")) && !/onmicrosoft\.com$/i.test(addr);
            if (isExternal) {
              findings.push({
                severity: "critical",
                when: new Date().toISOString(),
                message: "Externí přeposílací pravidlo: " + u.userPrincipalName + " → " + addr,
                messageEn: "External forward rule: " + u.userPrincipalName + " → " + addr,
                detail: "Pravidlo: \"" + rule.displayName + "\"",
                detailEn: "Rule: \"" + rule.displayName + "\""
              });
            }
          }
        }
      } catch (e) {
        // Některé účty (sdílené schránky, atd.) nemusí jít načíst — přeskoč
        if (e.status !== 403 && e.status !== 404) {
          console.warn("[forwarding-rules] skip user:", u.userPrincipalName, e.message);
        }
      }
    }
    return { findings };
  }
});

// CHECK 6: Licence — využití SKU, plýtvání
registerCheck({
  id: "licenses",
  name: "Licenční využití",
  category: "overview",
  run: async (token, tenant) => {
    const skus = await graphGetAll("/subscribedSkus", token, 200);
    const findings = [];
    let totalWaste = 0;

    for (const sku of skus) {
      const total = sku.prepaidUnits?.enabled || 0;
      const used = sku.consumedUnits || 0;
      const unused = total - used;
      if (total === 0) continue;
      if (unused >= 5) {
        totalWaste += unused;
        findings.push({
          severity: unused >= 20 ? "warning" : "info",
          when: new Date().toISOString(),
          message: "Nevyužité licence: " + sku.skuPartNumber + " — " + unused + " z " + total,
          messageEn: "Unused licenses: " + sku.skuPartNumber + " — " + unused + " of " + total,
          detail: "Využito: " + used + " · Volné: " + unused,
          detailEn: "Used: " + used + " · Free: " + unused
        });
      }
    }

    if (skus.length > 0) {
      findings.unshift({
        severity: "info",
        when: new Date().toISOString(),
        message: "Tenant má " + skus.length + " typů licencí, celkem " + totalWaste + " nevyužitých",
        messageEn: "Tenant has " + skus.length + " license types, " + totalWaste + " unused total"
      });

// CHECK 8: Hosté bez přihlášení déle než 90 dní
registerCheck({
  id: "stale-guests",

  category: "guests",
  run: async (token, tenant) => {
    const url = "/users?$filter=userType eq 'Guest'&$select=displayName,userPrincipalName,createdDateTime,signInActivity&$top=200";
    const guests = await graphGetAll(url, token, 500);
    const cutoff = Date.now() - 90 * 24 * 60 * 60 * 1000;

      if (!last) {

      return new Date(last).getTime() < cutoff;
    });

    const findings = [];
    if (stale.length > 0) {
      findings.push({
        severity: stale.length > 20 ? "warning" : "info",
        when: new Date().toISOString(),
        message: stale.length + " externích hostů bez přihlášení déle než 90 dní",
        messageEn: stale.length + " external guests with no sign-in for 90+ days",
        detail: "Doporučení: zkontrolovat a případně odebrat. Hostů celkem: " + guests.length,
        detailEn: "Recommendation: review and remove. Total guests: " + guests.length
      });
    }
    return { findings };
  }
});

// CHECK 11: Hesla bliží se expiraci (jednoduchá heuristika)
registerCheck({
  id: "passwords",
  name: "Expirace hesel",
  category: "identity",
  run: async (token, tenant) => {

      "/users?$filter=accountEnabled eq true and userType eq 'Member'&$select=userPrincipalName,lastPasswordChangeDateTime,passwordPolicies&$top=200",
      token, 500
    );
    // Předpokládáme default tenant policy 90 dní. Pokud uživatel má DisablePasswordExpiration, ignoruj.
    const POLICY_DAYS = 90;
    const cutoff = Date.now() - (POLICY_DAYS - 14) * 24 * 60 * 60 * 1000;

    const expiringSoon = users.filter(u => {
      if ((u.passwordPolicies || "").includes("DisablePasswordExpiration")) return false;
      const last = u.lastPasswordChangeDateTime;
      if (!last) return false;
      return new Date(last).getTime() < cutoff;
    });

    const findings = [];
    if (expiringSoon.length > 0) {
      findings.push({
        severity: "info",
        when: new Date().toISOString(),
        message: expiringSoon.length + " uživatelům brzy expiruje heslo (do 14 dní)",
        messageEn: expiringSoon.length + " users have passwords expiring within 14 days",
        detail: "Předpokládaná policy: " + POLICY_DAYS + " dní",
        detailEn: "Assumed policy: " + POLICY_DAYS + " days"
      });
    }
    return { findings };
  }
});

});

// CHECK 15 (Defender): Microsoft Secure Score
registerCheck({
  id: "secure-score",
  name: "Microsoft Secure Score",
  category: "threats",
  run: async (token, tenant) => {
    const data = await graphGet("/security/secureScores?$top=2", token);
    const scores = data.value || [];
    if (scores.length === 0) return { findings: [] };

    const current = scores[0];
    const yesterday = scores[1];
    const score = current.currentScore || 0;
    const max = current.maxScore || 100;
    const pct = max > 0 ? Math.round((score / max) * 100) : 0;
    const delta = yesterday ? Math.round(score - (yesterday.currentScore || 0)) : 0;
    const deltaStr = delta > 0 ? "+" + delta : (delta < 0 ? String(delta) : "±0");

    return { findings: [{
      severity: pct < 50 ? "warning" : "info",
      when: current.createdDateTime || new Date().toISOString(),
      message: "Secure Score: " + Math.round(score) + " / " + Math.round(max) + " (" + pct + "%)",
      messageEn: "Secure Score: " + Math.round(score) + " / " + Math.round(max) + " (" + pct + "%)",
      detail: "Změna oproti minulému měření: " + deltaStr,
      detailEn: "Change vs previous measurement: " + deltaStr
    }] };
  }
});

function render() {
  applyTranslations();
  renderNav();
  renderMain();
  renderAuthState();
}

function renderAuthState() {
  // Aktualizuj sidebar footer podle stavu přihlášení
  const tenantInfo = document.getElementById("tenant-info");
  if (tenantInfo) {
    if (isAuthenticated()) {
      tenantInfo.textContent = t("auth.signedInAs") + " " + getAccountName();
    } else {
      tenantInfo.textContent = t("app.notConnected");
    }
  }

  // Aktualizuj tlačítko přihlášení v topbaru
  const btn = document.getElementById("btn-login");
  if (!btn) return;

  if (isAuthenticated()) {
    btn.textContent = t("login.buttonSignOut");
    btn.disabled = false;
    btn.title = "";
    btn.onclick = signOut;
  } else if (!isConfigFilled()) {
    btn.textContent = t("login.button");
    btn.disabled = true;
    btn.title = t("login.disabled");
    btn.onclick = null;
  } else {
    btn.textContent = t("login.button");
    btn.disabled = false;
    btn.title = "";
    btn.onclick = signIn;
  }
}

/* ==========================================================================
   8) SETTINGS UI — formulář pro vyplnění configu (clientId + tenanty)

   Veškerá data uživatele žijí jen v localStorage. Při prvním otevření,
   pokud žádný config není uložený, se modal sám zobrazí.
   ========================================================================== */

// Pracovní kopie tenantů v modalu (řádky formuláře)
let settingsTenants = [];

function openSettings() {
  // Naplň formulář aktuálními hodnotami z localStorage (pokud existují)
  const stored = loadUserConfig();
  document.getElementById("cfg-clientId").value = stored?.clientId || "";
  settingsTenants = stored?.managedTenants
    ? stored.managedTenants.map(t => ({ id: t.id || "", name: t.name || "" }))
    : [{ id: "", name: "" }];

  // Aktualizuj texty podle aktuálního jazyka
  document.getElementById("settings-title").textContent  = t("settings.title");
  document.getElementById("settings-intro").textContent  = t("settings.intro");
  document.getElementById("lbl-clientId").textContent    = t("settings.clientId");
  document.getElementById("hint-clientId").textContent   = t("settings.clientIdHint");
  document.getElementById("lbl-tenants").textContent     = t("settings.tenants");
  document.getElementById("hint-tenants").textContent    = t("settings.tenantsHint");
  document.getElementById("btn-add-tenant").textContent  = "+ " + t("settings.addTenant");
  document.getElementById("btn-cancel-settings").textContent = t("settings.cancel");
  document.getElementById("btn-save-config").textContent = t("settings.save");
  document.getElementById("btn-clear-config").textContent = t("settings.clearAll");
  document.getElementById("privacy-banner-small").textContent = t("settings.privacyNote");

  renderSettingsTenants();
  document.getElementById("settings-modal").classList.add("show");
}

function closeSettings() {
  document.getElementById("settings-modal").classList.remove("show");
}

function renderSettingsTenants() {
  const list = document.getElementById("tenants-list");
  list.innerHTML = "";
  settingsTenants.forEach((tenant, idx) => {
    const row = document.createElement("div");
    row.className = "tenant-row";
    row.innerHTML = `
      <input type="text" placeholder="${t("settings.tenantName")}" value="${escapeHtml(tenant.name)}" data-idx="${idx}" data-field="name">
      <input type="text" placeholder="${t("settings.tenantId")} (00000000-0000-0000-0000-000000000000)" value="${escapeHtml(tenant.id)}" data-idx="${idx}" data-field="id">
      <button class="remove-btn" data-remove="${idx}" title="${t("settings.remove")}">×</button>
    `;
    list.appendChild(row);
  });
  // Připoj listenery
  list.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("input", e => {
      const i = parseInt(e.target.dataset.idx, 10);
      const f = e.target.dataset.field;
      settingsTenants[i][f] = e.target.value.trim();
    });
  });
  list.querySelectorAll(".remove-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      const i = parseInt(e.target.dataset.remove, 10);
      settingsTenants.splice(i, 1);
      if (settingsTenants.length === 0) settingsTenants.push({ id: "", name: "" });
      renderSettingsTenants();
    });
  });
}

function escapeHtml(s) {
  if (!s) return "";
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function isValidGuid(s) {
  return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s || "");
}

function saveSettings() {
  const clientId = document.getElementById("cfg-clientId").value.trim();
  if (!isValidGuid(clientId)) {
    alert(t("settings.invalidClientId"));
    return;
  }
  // Vyfiltruj prázdné řádky
  const validTenants = settingsTenants
    .filter(x => x.id && x.id.trim())
    .map(x => ({
      id: x.id.trim(),
      name: (x.name && x.name.trim()) || x.id.trim().substring(0, 8)
    }));
  if (validTenants.length === 0) {
    alert(t("settings.invalidTenantId"));
    return;
  }
  // Pokud nějaký tenant ID nevypadá jako GUID, varuj ale neblokuj
  const badGuids = validTenants.filter(x => !isValidGuid(x.id));
  if (badGuids.length > 0) {
    if (!confirm("Některá Tenant ID nevypadají jako platný GUID:\n" + badGuids.map(x => x.id).join("\n") + "\n\nUložit přesto?")) {
      return;
    }
  }

  saveUserConfig({
    clientId,
    managedTenants: validTenants,
    scopes: ["User.Read"]
  });

  closeSettings();
  // Resetuj auth stav a překresli s novým configem
  authClearTokens();
  currentAccount = null;
  currentTokens = null;
  activeTenantId = null;
  initAuth().then(() => render());
}

function clearAllConfig() {
  if (!confirm(t("settings.confirmClear"))) return;
  localStorage.removeItem(LS_CONFIG_KEY);
  closeSettings();
  authClearTokens();
  currentAccount = null;
  currentTokens = null;
  activeTenantId = null;
  // Otevři modal znova s prázdnými poli
  setTimeout(openSettings, 50);
  render();
}

// Naváži listenery jednou při startu (modal je v DOMu od začátku)
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("settings-close").addEventListener("click", closeSettings);
  document.getElementById("btn-cancel-settings").addEventListener("click", closeSettings);
  document.getElementById("btn-save-config").addEventListener("click", saveSettings);
  document.getElementById("btn-clear-config").addEventListener("click", clearAllConfig);
  document.getElementById("btn-add-tenant").addEventListener("click", () => {
    settingsTenants.push({ id: "", name: "" });
    renderSettingsTenants();
  });
  // Klik mimo modal zavře (jen click na overlay, ne na samotný panel)
  document.getElementById("settings-modal").addEventListener("click", e => {
    if (e.target.id === "settings-modal") closeSettings();
  });
});

/* ==========================================================================
   9) START — inicializuj a vykresli

// Nejdřív inicializuj MSAL (může načíst cached účet), teprve pak vykresli.
// Pokud uživatel nemá vyplněný config, otevři rovnou Nastavení.
initAuth().then(() => {
  render();
  if (!isConfigFilled()) {
    // Otevři modal jakmile DOM nastartuje (kvůli porovnání kdy se naloadovaly listenery)
    setTimeout(openSettings, 100);
  } else if (isAuthenticated() && typeof refreshFindings === "function") {
    // Pokud jsme přihlášeni (např. po návratu z redirect login), automaticky stáhni data
    setTimeout(refreshFindings, 200);
  }
});

/* ==========================================================================
   8) PWA — service worker a install prompt

   Service worker (sw.js) cachuje statické soubory aplikace, takže
   funguje i offline. Install prompt umožňuje uživateli přidat
   aplikaci na plochu jako nativní app.
   ========================================================================== */

let deferredInstallPrompt = null;

// Registruj service worker (běží jen na https a localhost)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(reg => console.log("[pwa] Service worker zaregistrován, scope:", reg.scope))
      .catch(err => console.warn("[pwa] Service worker se nepodařilo zaregistrovat:", err));
  });
}

// Chrome/Edge — odchytí "beforeinstallprompt" a uloží ho pro pozdější použití
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Re-render aby se objevilo install tlačítko
  if (typeof renderMain === "function") renderMain();
});

window.addEventListener("appinstalled", () => {
  console.log("[pwa] Aplikace nainstalována");
  deferredInstallPrompt = null;
});

// Backdrop kliknutí zavře sidebar
document.addEventListener("DOMContentLoaded", () => {
  const backdrop = document.getElementById("backdrop");
  if (backdrop) {
    backdrop.addEventListener("click", () => {
      document.querySelector(".sidebar").classList.remove("open");
      backdrop.classList.remove("show");
    });
  }
});

document.addEventListener("click", e => {
  if (e.target.closest(".nav-item")) {
    document.querySelector(".sidebar").classList.remove("open");
    const backdrop = document.getElementById("backdrop");
    if (backdrop) backdrop.classList.remove("show");
  }
});
</script>
